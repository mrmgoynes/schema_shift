openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
paths:
  /users/{id}:
    get:
      summary: Get user details
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - username
                  - email
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
