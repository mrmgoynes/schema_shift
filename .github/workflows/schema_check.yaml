name: SchemaShift CI Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-contract:
    runs-on: ubuntu-latest

    services:
      postgres_db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sdet_admin
          POSTGRES_PASSWORD: SecretPassword123
          POSTGRES_DB: user_directory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdet_admin -d user_directory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Check out project code
      uses: actions/checkout@v3

    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary pyyaml requests pytest

    - name: Seed the Cloud Test Database
      run: python seed_db.py

    - name: Execute Live Schema Validation Suite
      run: python test_run.py
